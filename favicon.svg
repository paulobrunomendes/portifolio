<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#c8b08a"/>
      <stop offset="100%" stop-color="#8a7560"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffe97a"/>
      <stop offset="30%"  stop-color="#d4a017"/>
      <stop offset="60%"  stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#8a6000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Warm beige background -->
  <rect width="32" height="32" rx="4" fill="url(#bg)"/>

  <!-- Shadow/depth layer -->
  <text x="16.6" y="22.6"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    text-anchor="middle"
    fill="#3a2800"
    opacity="0.5">PBM</text>

  <!-- Gold PBM text -->
  <text x="16" y="22"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    text-anchor="middle"
    fill="url(#gold)"
    filter="url(#glow)">PBM</text>
</svg>
