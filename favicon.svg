<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#111111"/>

  <!-- Gold top accent bar -->
  <rect x="5" y="5" width="22" height="1.5" rx="0.75" fill="#b89860"/>

  <!-- Left angle bracket -->
  <path d="M7 12 L4.5 16 L7 20" stroke="#8a7560" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right angle bracket -->
  <path d="M25 12 L27.5 16 L25 20" stroke="#8a7560" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- pb initials -->
  <text x="16" y="21"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    font-weight="700"
    text-anchor="middle"
    fill="#c8b89a">pb</text>

  <!-- Gold bottom accent bar -->
  <rect x="5" y="25.5" width="22" height="1.5" rx="0.75" fill="#b89860"/>
</svg>
